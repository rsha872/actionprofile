name: Rakesh workflows 

on:
   # push:
        #branches: [main]

  workflow_dispatch:

jobs:
    Build:
      runs-on: ubuntu-latest 
      steps:
        - name: checkout code
          uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - name: Maven Build
          run: mvn install 
    Test:
      runs-on: ubuntu-latest 
      needs: Build 
      steps:

        - name: checkout code 
          uses: actions/checkout@v4

        - name: Run test on main branch 
          run: mvn test 

        - name: Checkstyle
          run: mvn checkstyle:checkstyle 




